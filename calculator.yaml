apiVersion: v1
kind: Namespace
metadata:
  name: calculator
  labels:
    app: calculator
---
apiVersion: v1
kind: LimitRange
metadata:
  name: calculator
  namespace: calculator
  labels:
    app: calculator
spec:
  limits:
    - type: Container
      defaultRequest:
        ephemeral-storage: 1Gi
        cpu: "0.01"
        memory: 32Mi
      default:
        ephemeral-storage: 10Gi
        cpu: "1"
        memory: 256Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: calculator
  labels:
    role: backend
    app: calculator
spec:
  replicas: 1
  selector:
    matchLabels:
      role: backend
      app: calculator
  template:
    metadata:
      name: backend
      namespace: calculator
      labels:
        role: backend
        app: calculator
    spec:
      automountServiceAccountToken: false
      nodeName: old-hp
      containers:
        - name: backend
          image: viktorlisovyi/calculator-backend:1.36
          imagePullPolicy: Always
          ports:
            - name: backend
              containerPort: 8080
              protocol: TCP
      restartPolicy: Always
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: graph
  namespace: calculator
  labels:
    role: graph
    app: calculator
spec:
  replicas: 1
  selector:
    matchLabels:
      role: graph
      app: calculator
  template:
    metadata:
      name: graph
      namespace: calculator
      labels:
        role: graph
        app: calculator
    spec:
      automountServiceAccountToken: false
      nodeName: old-hp
      containers:
        - name: graph
          image: viktorlisovyi/calculator-graph:1.0
          imagePullPolicy: Always
          ports:
            - name: graph
              containerPort: 8080
              protocol: TCP
      restartPolicy: Always
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: calculator
  labels:
    role: frontend
    app: calculator
spec:
  replicas: 1
  selector:
    matchLabels:
      role: frontend
      app: calculator
  template:
    metadata:
      name: frontend
      namespace: calculator
      labels:
        role: frontend
        app: calculator
    spec:
      automountServiceAccountToken: false
      nodeName: old-hp
      containers:
        - name: frontend
          image: viktorlisovyi/calculator-frontend:1.36
          imagePullPolicy: Always
          ports:
            - name: frontend
              containerPort: 80
              protocol: TCP
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: calculator
  labels:
    app: calculator
spec:
  selector:
    role: backend
  ports:
    - name: backend
      port: 8080
      targetPort: 8080
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: graph
  namespace: calculator
  labels:
    app: calculator
spec:
  selector:
    role: graph
  ports:
    - name: backend
      port: 8080
      targetPort: 8080
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: calculator
  labels:
    app: calculator
spec:
  selector:
    role: frontend
  ports:
    - name: frontend
      port: 80
      targetPort: 80
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend
  namespace: calculator
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
          - path: /graph
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
